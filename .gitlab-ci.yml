workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - test
  - package
  - image
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CI: "true"
  MAVEN_CLI_OPTS: "-B -ntp"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  EAS_BUILD_PLATFORM: "android"
  EAS_BUILD_PROFILE: "preview"
  ADMIN_WEB_API_BASE_URL: "http://localhost:8080/api"
  ECOMMERCE_JWT_SECRET: "ci-jwt-secret-change-in-gitlab-variables"
  AUTH_OTP_SECRET: "ci-otp-secret-change-in-gitlab-variables"
  ECOMMERCE_DB_URL: "jdbc:postgresql://localhost:5432/ecommerce_ci"
  ECOMMERCE_DB_USERNAME: "postgres"
  ECOMMERCE_DB_PASSWORD: "postgres"
  REDIS_HOST: "localhost"
  KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
  EVENTS_KAFKA_ENABLED: "true"
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  SEPAY_ENABLED: "false"

  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  AWS_REGION: "ap-southeast-1"
  ECR_REGISTRY: "316544164613.dkr.ecr.ap-southeast-1.amazonaws.com"
  ECR_CREATE_REPOSITORIES: "false"
  ECR_EXTRA_TAG: "phase3"
  ECS_CLUSTER: ""
  ECS_SERVICE_NAMES: "api-gateway user-service catalog-service commerce-service assistant-service chat-service"
  ECS_WAIT_FOR_STABILITY: "true"

.backend_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore

.backend_delivery_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
      when: manual
      allow_failure: true

.mobile_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - changes:
        - mobile-app/**/*
        - .gitlab-ci.yml

.admin_web_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - changes:
        - admin-web/**/*
        - .gitlab-ci.yml
        - .dockerignore

.admin_web_delivery_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - admin-web/**/*
        - .gitlab-ci.yml
        - .dockerignore
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - admin-web/**/*
        - .gitlab-ci.yml
        - .dockerignore
      when: manual
      allow_failure: true

.backend_ecr_rules:
  rules:
    - if: '$CI_COMMIT_TAG && $ECR_REGISTRY'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $ECR_REGISTRY'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $ECR_REGISTRY'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $ECR_REGISTRY'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
      when: manual
      allow_failure: true

.ecs_deploy_rules:
  rules:
    - if: '$CI_COMMIT_TAG && $ECS_CLUSTER'
      when: manual
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $ECS_CLUSTER'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $ECS_CLUSTER'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $ECS_CLUSTER'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
        - build-and-push-ecr.ps1
      when: manual
      allow_failure: true

backend:test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  extends: .backend_rules
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit:
        - backend/**/target/surefire-reports/*.xml
    paths:
      - backend/**/target/surefire-reports/

mobile:validate:
  stage: validate
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  extends: .mobile_rules
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run typecheck

mobile:expo_doctor:
  stage: validate
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  extends: .mobile_rules
  allow_failure: true
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - npx expo-doctor@latest

admin-web:validate:
  stage: validate
  image: node:22-bullseye
  cache:
    key:
      files:
        - admin-web/package-lock.json
    paths:
      - .npm/
  extends: .admin_web_rules
  script:
    - cd admin-web
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run build

backend:package:
  stage: package
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  needs:
    - job: backend:test
      artifacts: false
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    expire_in: 14 days
    paths:
      - backend/*/target/*.jar

admin-web:package:
  stage: package
  image: node:22-bullseye
  cache:
    key:
      files:
        - admin-web/package-lock.json
    paths:
      - .npm/
  needs:
    - job: admin-web:validate
      artifacts: false
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - admin-web/**/*
        - .gitlab-ci.yml
  script:
    - cd admin-web
    - npm ci --prefer-offline --no-audit
    - npm run build
  artifacts:
    expire_in: 14 days
    paths:
      - admin-web/dist/

backend:docker:
  stage: image
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
  parallel:
    matrix:
      - SERVICE_NAME: api-gateway
        APP_PORT: "8080"
      - SERVICE_NAME: user-service
        APP_PORT: "8081"
      - SERVICE_NAME: catalog-service
        APP_PORT: "8082"
      - SERVICE_NAME: commerce-service
        APP_PORT: "8083"
      - SERVICE_NAME: assistant-service
        APP_PORT: "8084"
      - SERVICE_NAME: chat-service
        APP_PORT: "8086"
  extends: .backend_delivery_rules
  needs:
    - job: backend:test
      artifacts: false
  before_script:
    - printf '%s' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - export IMAGE_COMMIT_TAG="$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA"
    - export IMAGE_REF_TAG="$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_REF_SLUG"
    - docker build -f backend/Dockerfile --build-arg SERVICE_NAME="$SERVICE_NAME" --build-arg APP_PORT="$APP_PORT" -t "$IMAGE_COMMIT_TAG" -t "$IMAGE_REF_TAG" .
    - docker push "$IMAGE_COMMIT_TAG"
    - docker push "$IMAGE_REF_TAG"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$CI_REGISTRY_IMAGE/$SERVICE_NAME:latest"
        docker push "$CI_REGISTRY_IMAGE/$SERVICE_NAME:latest"
      fi

backend:ecr:
  stage: image
  image:
    name: amazon/aws-cli:2.34.57
    entrypoint: [""]
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
  parallel:
    matrix:
      - SERVICE_NAME: api-gateway
        ECR_REPOSITORY: ecommerce-api-gateway
        APP_PORT: "8080"
      - SERVICE_NAME: user-service
        ECR_REPOSITORY: ecommerce-user-service
        APP_PORT: "8081"
      - SERVICE_NAME: catalog-service
        ECR_REPOSITORY: ecommerce-catalog-service
        APP_PORT: "8082"
      - SERVICE_NAME: commerce-service
        ECR_REPOSITORY: ecommerce-commerce-service
        APP_PORT: "8083"
      - SERVICE_NAME: assistant-service
        ECR_REPOSITORY: ecommerce-assistant-service
        APP_PORT: "8084"
      - SERVICE_NAME: chat-service
        ECR_REPOSITORY: ecommerce-chat-service
        APP_PORT: "8086"
  extends: .backend_ecr_rules
  needs:
    - job: backend:test
      artifacts: false
      optional: true
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  before_script:
    - yum install -y docker
    - test -n "$ECR_REGISTRY"
    - test -n "$AWS_REGION"
    - export AWS_DEFAULT_REGION="$AWS_REGION"
    - |
      if [ -n "${AWS_ROLE_ARN:-}" ]; then
        export AWS_WEB_IDENTITY_TOKEN_FILE="$CI_PROJECT_DIR/.aws-web-identity-token"
        printf '%s' "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
        export AWS_ROLE_SESSION_NAME="gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
      elif [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
        echo "Using AWS access key variables for ECR publishing."
      else
        echo "AWS credentials are required. Configure AWS_ROLE_ARN for GitLab OIDC, or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY."
        echo "If AWS_ROLE_ARN is a protected GitLab variable, run this job on a protected branch/tag or protect this review branch."
        exit 1
      fi
    - aws sts get-caller-identity
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
  script:
    - |
      if [ "$ECR_CREATE_REPOSITORIES" = "true" ]; then
        aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1 \
          || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null
      fi
    - export IMAGE_COMMIT_TAG="$ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHORT_SHA"
    - export IMAGE_REF_TAG="$ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_REF_SLUG"
    - docker build -f backend/Dockerfile --build-arg SERVICE_NAME="$SERVICE_NAME" --build-arg APP_PORT="$APP_PORT" -t "$IMAGE_COMMIT_TAG" -t "$IMAGE_REF_TAG" .
    - docker push "$IMAGE_COMMIT_TAG"
    - docker push "$IMAGE_REF_TAG"
    - |
      if [ -n "$ECR_EXTRA_TAG" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_EXTRA_TAG"
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_EXTRA_TAG"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_TAG"
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
      fi

admin-web:docker:
  stage: image
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
  extends: .admin_web_delivery_rules
  needs:
    - job: admin-web:validate
      artifacts: false
  before_script:
    - printf '%s' "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - export IMAGE_COMMIT_TAG="$CI_REGISTRY_IMAGE/admin-web:$CI_COMMIT_SHORT_SHA"
    - export IMAGE_REF_TAG="$CI_REGISTRY_IMAGE/admin-web:$CI_COMMIT_REF_SLUG"
    - docker build -f admin-web/Dockerfile --build-arg VITE_API_BASE_URL="$ADMIN_WEB_API_BASE_URL" -t "$IMAGE_COMMIT_TAG" -t "$IMAGE_REF_TAG" .
    - docker push "$IMAGE_COMMIT_TAG"
    - docker push "$IMAGE_REF_TAG"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$CI_REGISTRY_IMAGE/admin-web:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE/admin-web:$CI_COMMIT_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_COMMIT_TAG" "$CI_REGISTRY_IMAGE/admin-web:latest"
        docker push "$CI_REGISTRY_IMAGE/admin-web:latest"
      fi

deploy:staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: backend:docker
      artifacts: false
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
        - .dockerignore
      when: manual
    - when: never
  environment:
    name: staging
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$DEPLOY_PATH"
    - test -n "$DEPLOY_SSH_PRIVATE_KEY"
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
    - scp backend/docker-compose.yml backend/docker-compose.apps.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - printf '%s' "$CI_REGISTRY_PASSWORD" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY'"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        set -e
        cd '$DEPLOY_PATH'
        SERVICES='api-gateway user-service catalog-service commerce-service assistant-service chat-service'
        REGISTRY_IMAGE='$CI_REGISTRY_IMAGE' IMAGE_TAG='$CI_COMMIT_SHORT_SHA' docker compose --env-file .env -f docker-compose.yml -f docker-compose.apps.yml pull \$SERVICES
        REGISTRY_IMAGE='$CI_REGISTRY_IMAGE' IMAGE_TAG='$CI_COMMIT_SHORT_SHA' docker compose --env-file .env -f docker-compose.yml -f docker-compose.apps.yml up -d \$SERVICES
      "

deploy:admin-web_staging:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: admin-web:docker
      artifacts: false
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - admin-web/**/*
        - .gitlab-ci.yml
        - .dockerignore
      when: manual
    - when: never
  environment:
    name: staging
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$DEPLOY_PATH"
    - test -n "$DEPLOY_SSH_PRIVATE_KEY"
    - eval "$(ssh-agent -s)"
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
    - scp backend/docker-compose.yml backend/docker-compose.apps.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - printf '%s' "$CI_REGISTRY_PASSWORD" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker login -u '$CI_REGISTRY_USER' --password-stdin '$CI_REGISTRY'"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        set -e
        cd '$DEPLOY_PATH'
        REGISTRY_IMAGE='$CI_REGISTRY_IMAGE' IMAGE_TAG='$CI_COMMIT_SHORT_SHA' docker compose --env-file .env -f docker-compose.yml -f docker-compose.apps.yml pull admin-web
        REGISTRY_IMAGE='$CI_REGISTRY_IMAGE' IMAGE_TAG='$CI_COMMIT_SHORT_SHA' docker compose --env-file .env -f docker-compose.yml -f docker-compose.apps.yml up -d --no-deps admin-web
      "

deploy:ecs_production_like:
  stage: deploy
  image:
    name: amazon/aws-cli:2.34.57
    entrypoint: [""]
  extends: .ecs_deploy_rules
  needs:
    - job: backend:ecr
      artifacts: false
      optional: true
  environment:
    name: production-like
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  before_script:
    - test -n "$ECS_CLUSTER"
    - test -n "$ECS_SERVICE_NAMES"
    - test -n "$AWS_REGION"
    - export AWS_DEFAULT_REGION="$AWS_REGION"
    - |
      if [ -n "${AWS_ROLE_ARN:-}" ]; then
        export AWS_WEB_IDENTITY_TOKEN_FILE="$CI_PROJECT_DIR/.aws-web-identity-token"
        printf '%s' "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
        export AWS_ROLE_SESSION_NAME="gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}-ecs"
      elif [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
        echo "Using AWS access key variables for ECS deployment."
      else
        echo "AWS credentials are required. Configure AWS_ROLE_ARN for GitLab OIDC, or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY."
        echo "If AWS_ROLE_ARN is a protected GitLab variable, run this job on a protected branch/tag or protect this review branch."
        exit 1
      fi
    - aws sts get-caller-identity
  script:
    - |
      for service in $ECS_SERVICE_NAMES; do
        echo "Forcing ECS deployment: cluster=$ECS_CLUSTER service=$service"
        aws ecs update-service \
          --cluster "$ECS_CLUSTER" \
          --service "$service" \
          --force-new-deployment \
          --region "$AWS_REGION" \
          --no-cli-pager
      done
    - |
      if [ "$ECS_WAIT_FOR_STABILITY" = "true" ]; then
        echo "Waiting for ECS services to become stable: $ECS_SERVICE_NAMES"
        aws ecs wait services-stable \
          --cluster "$ECS_CLUSTER" \
          --services $ECS_SERVICE_NAMES \
          --region "$AWS_REGION"
      fi
    - |
      aws ecs describe-services \
        --cluster "$ECS_CLUSTER" \
        --services $ECS_SERVICE_NAMES \
        --region "$AWS_REGION" \
        --query 'services[].{service:serviceName,status:status,desired:desiredCount,running:runningCount,pending:pendingCount,deployments:length(deployments)}' \
        --output table \
        --no-cli-pager

.mobile_eas_build_template:
  stage: package
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - |
      if [ -z "$EXPO_TOKEN" ]; then
        echo "EXPO_TOKEN is required. Add it in GitLab CI/CD Variables.";
        exit 1;
      fi
    - npx eas-cli@latest build --platform "$EAS_BUILD_PLATFORM" --profile "$EAS_BUILD_PROFILE" --non-interactive --no-wait

mobile:eas_preview:
  extends: .mobile_eas_build_template
  needs:
    - job: mobile:validate
      artifacts: false
  variables:
    EAS_BUILD_PROFILE: "preview"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - mobile-app/**/*
        - .gitlab-ci.yml
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual

mobile:eas_production:
  extends: .mobile_eas_build_template
  needs:
    - job: mobile:validate
      artifacts: false
  variables:
    EAS_BUILD_PROFILE: "production"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual

pipeline_info:
  stage: validate
  script:
    - echo "Khởi chạy pipeline cho nhánh $CI_COMMIT_BRANCH"
  rules:
    - when: always
