workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - test
  - package

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CI: "true"
  MAVEN_CLI_OPTS: "-B -ntp"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  EAS_BUILD_PLATFORM: "android"
  EAS_BUILD_PROFILE: "preview"
  ECOMMERCE_JWT_SECRET: "ci-jwt-secret-change-in-gitlab-variables"
  AUTH_OTP_SECRET: "ci-otp-secret-change-in-gitlab-variables"
  ECOMMERCE_DB_URL: "jdbc:postgresql://localhost:5432/ecommerce_ci"
  ECOMMERCE_DB_USERNAME: "postgres"
  ECOMMERCE_DB_PASSWORD: "postgres"
  REDIS_HOST: "localhost"
  KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
  EVENTS_KAFKA_ENABLED: "true"
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  SEPAY_ENABLED: "false"

.backend_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - changes:
        - backend/**/*
        - .gitlab-ci.yml

.mobile_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - changes:
        - mobile-app/**/*
        - .gitlab-ci.yml

backend:test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  extends: .backend_rules
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit:
        - backend/**/target/surefire-reports/*.xml
    paths:
      - backend/**/target/surefire-reports/

mobile:validate:
  stage: validate
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  extends: .mobile_rules
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - npm run typecheck

mobile:expo_doctor:
  stage: validate
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  extends: .mobile_rules
  allow_failure: true
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - npx expo-doctor@latest

backend:package:
  stage: package
  image: maven:3.9.9-eclipse-temurin-17
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository
  needs:
    - job: backend:test
      artifacts: false
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
  script:
    - cd backend
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    expire_in: 14 days
    paths:
      - backend/*/target/*.jar

.mobile_eas_build_template:
  stage: package
  image: node:22-bullseye
  cache:
    key:
      files:
        - mobile-app/package-lock.json
    paths:
      - .npm/
  script:
    - cd mobile-app
    - npm ci --prefer-offline --no-audit
    - |
      if [ -z "$EXPO_TOKEN" ]; then
        echo "EXPO_TOKEN is required. Add it in GitLab CI/CD Variables.";
        exit 1;
      fi
    - npx eas-cli@latest build --platform "$EAS_BUILD_PLATFORM" --profile "$EAS_BUILD_PROFILE" --non-interactive --no-wait

mobile:eas_preview:
  extends: .mobile_eas_build_template
  needs:
    - job: mobile:validate
      artifacts: false
  variables:
    EAS_BUILD_PROFILE: "preview"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - mobile-app/**/*
        - .gitlab-ci.yml
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual

mobile:eas_production:
  extends: .mobile_eas_build_template
  needs:
    - job: mobile:validate
      artifacts: false
  variables:
    EAS_BUILD_PROFILE: "production"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual

pipeline_info:
  stage: validate
  script:
    - echo "Khởi chạy pipeline cho nhánh $CI_COMMIT_BRANCH"
  rules:
    - when: always
