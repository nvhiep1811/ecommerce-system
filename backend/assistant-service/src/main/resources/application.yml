server:
  port: ${ASSISTANT_SERVICE_PORT:8084}

spring:
  application:
    name: assistant-service
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  temperature: ${GEMINI_TEMPERATURE:0.3}
  max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}

security:
  jwt:
    secret: ${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
    expiration-seconds: ${ECOMMERCE_JWT_EXPIRATION_SECONDS:86400}

services:
  catalog:
    url: ${CATALOG_SERVICE_URL:http://localhost:8082}
  commerce:
    url: ${COMMERCE_SERVICE_URL:http://localhost:8083}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
