global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: ecommerce-api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [api-gateway:8080]

  - job_name: ecommerce-user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [user-service:8081]

  - job_name: ecommerce-catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [catalog-service:8082]

  - job_name: ecommerce-commerce-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [commerce-service:8083]

  - job_name: ecommerce-chat-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [chat-service:8086]

  - job_name: ecommerce-assistant-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [assistant-service:8084]
