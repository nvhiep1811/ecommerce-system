spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: user-service
  datasource:
    url: ${ECOMMERCE_DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${ECOMMERCE_DB_USERNAME:postgres}
    password: ${ECOMMERCE_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: ${AVATAR_UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${AVATAR_UPLOAD_MAX_REQUEST_SIZE:6MB}

server:
  port: ${USER_SERVICE_PORT:8081}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:200}
      min-spare: ${SERVER_TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
  connection-timeout: ${SERVER_CONNECTION_TIMEOUT:5s}

security:
  jwt:
    secret: ${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
    expiration-seconds: ${ECOMMERCE_JWT_EXPIRATION_SECONDS:86400}
    remember-me-expiration-seconds: ${ECOMMERCE_JWT_REMEMBER_ME_EXPIRATION_SECONDS:2592000}

auth:
  otp:
    enabled: ${AUTH_OTP_ENABLED:true}
    register-required: ${AUTH_REGISTER_OTP_REQUIRED:true}
    length: ${AUTH_OTP_LENGTH:6}
    ttl-minutes: ${AUTH_OTP_TTL_MINUTES:10}
    reset-token-ttl-minutes: ${AUTH_RESET_TOKEN_TTL_MINUTES:10}
    resend-cooldown-seconds: ${AUTH_OTP_RESEND_COOLDOWN_SECONDS:60}
    max-attempts: ${AUTH_OTP_MAX_ATTEMPTS:5}
    secret: ${AUTH_OTP_SECRET:${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}}

supabase:
  storage:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:product-images}
    avatar-folder: ${SUPABASE_AVATAR_FOLDER:users/avatars}
    max-avatar-size-bytes: ${SUPABASE_AVATAR_MAX_SIZE_BYTES:5242880}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: ${MANAGEMENT_HTTP_SERVER_REQUESTS_HISTOGRAM:true}
