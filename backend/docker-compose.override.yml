# file: docker-compose.override.yml
services:
  # -------------------------------------------------
  #   2️⃣ user‑service
  # -------------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    env_file: .env
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-service.rule=PathPrefix(`/user`)"
      - "traefik.http.routers.user-service.entrypoints=web,websecure"
      - "traefik.http.services.user-service.loadbalancer.server.port=8080"

  # -------------------------------------------------
  #   3️⃣ catalog‑service
  # -------------------------------------------------
  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: catalog-service
    env_file: .env
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.catalog-service.rule=PathPrefix(`/catalog`)"
      - "traefik.http.routers.catalog-service.entrypoints=web,websecure"
      - "traefik.http.services.catalog-service.loadbalancer.server.port=8080"

  # -------------------------------------------------
  #   4️⃣ commerce‑service
  # -------------------------------------------------
  commerce-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: commerce-service
    env_file: .env
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.commerce-service.rule=PathPrefix(`/commerce`)"
      - "traefik.http.routers.commerce-service.entrypoints=web,websecure"
      - "traefik.http.services.commerce-service.loadbalancer.server.port=8080"

  # -------------------------------------------------
  #   5️⃣ chat‑service  (WebSocket – sticky)
  # -------------------------------------------------
  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: chat-service
    env_file: .env
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat-service.rule=PathPrefix(`/chat`)"
      - "traefik.http.routers.chat-service.entrypoints=web,websecure"
      - "traefik.http.services.chat-service.loadbalancer.server.port=8080"
      # Sticky‑session ensures a WebSocket connection stays on the same replica
      - "traefik.http.services.chat-service.loadbalancer.sticky=true"
      - "traefik.http.services.chat-service.loadbalancer.sticky.cookie=true"

  # -------------------------------------------------
  #   6️⃣ assistant‑service
  # -------------------------------------------------
  assistant-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: assistant-service
    env_file: .env
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.assistant-service.rule=PathPrefix(`/assistant`)"
      - "traefik.http.routers.assistant-service.entrypoints=web,websecure"
      - "traefik.http.services.assistant-service.loadbalancer.server.port=8080"
