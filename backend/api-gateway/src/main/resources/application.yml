spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=1
        - id: commerce-service
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/commerce/**
          filters:
            - StripPrefix=1
        - id: commerce-service-orders
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: commerce-service-payment-methods
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payment-methods
          filters:
            - StripPrefix=1
        - id: commerce-service-shipping-methods
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/shipping-methods
          filters:
            - StripPrefix=1
        - id: commerce-service-payments
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: commerce-service-webhooks
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/webhooks/**
          filters:
            - StripPrefix=1
              
        # ── Chat Service ──────────────────────────────────────────
        - id: chat-service-rest
          uri: ${CHAT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        - id: chat-service-websocket
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8084}
          predicates:
            - Path=/ws/chat/**
          filters:
            - StripPrefix=0

server:
  port: ${API_GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
