spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  cloud:
    gateway:
      httpclient:
        connect-timeout: ${GATEWAY_HTTPCLIENT_CONNECT_TIMEOUT_MS:3000}
        response-timeout: ${GATEWAY_HTTPCLIENT_RESPONSE_TIMEOUT:10s}
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: chat-service-websocket
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8086}
          predicates:
            - Path=/api/chat/ws
          filters:
            - StripPrefix=1
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=1
        - id: commerce-service
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/commerce/**
          filters:
            - StripPrefix=1
        - id: commerce-service-orders
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: commerce-service-payment-methods
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payment-methods
          filters:
            - StripPrefix=1
        - id: commerce-service-shipping-methods
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/shipping-methods
          filters:
            - StripPrefix=1
        - id: commerce-service-payments
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: commerce-service-webhooks
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/webhooks/**
          filters:
            - StripPrefix=1
              
        # ── Chat Service ──────────────────────────────────────────
        - id: chat-service-rest
          uri: ${CHAT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        - id: chat-service-websocket
          uri: ${CHAT_SERVICE_WS_URL:ws://localhost:8085}
          predicates:
            - Path=/ws/chat/**
          filters:
            - StripPrefix=0

        - id: assistant-service
          uri: ${ASSISTANT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/assistant/**
          filters:
            - StripPrefix=1

server:
  port: ${API_GATEWAY_PORT:8080}

gateway:
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:false}
    store: ${GATEWAY_RATE_LIMIT_STORE:auto}
    requests-per-minute: ${GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
    include-path-in-key: ${GATEWAY_RATE_LIMIT_INCLUDE_PATH_IN_KEY:true}
    auth-enabled: ${GATEWAY_AUTH_RATE_LIMIT_ENABLED:true}
    auth-requests-per-minute: ${GATEWAY_AUTH_RATE_LIMIT_REQUESTS_PER_MINUTE:30}
    auth-prefixes:
      - /api/auth
    excluded-prefixes:
      - /api/webhooks
      - /api/payments/sepay/ipn

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: ${MANAGEMENT_HTTP_SERVER_REQUESTS_HISTOGRAM:true}
