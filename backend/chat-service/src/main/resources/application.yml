spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: chat-service
  datasource:
    url: ${ECOMMERCE_DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${ECOMMERCE_DB_USERNAME:postgres}
    password: ${ECOMMERCE_DB_PASSWORD:}
    hikari:
      read-only: false
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${CHAT_MEDIA_MAX_FILE_SIZE:50MB}
      max-request-size: ${CHAT_MEDIA_MAX_REQUEST_SIZE:55MB}

server:
  port: ${CHAT_SERVICE_PORT:8086}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:200}
      min-spare: ${SERVER_TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
  connection-timeout: ${SERVER_CONNECTION_TIMEOUT:5s}

security:
  jwt:
    secret: ${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
    expiration-seconds: ${ECOMMERCE_JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: ${MANAGEMENT_HTTP_SERVER_REQUESTS_HISTOGRAM:true}

chat:
  media:
    max-image-size-bytes: ${CHAT_MEDIA_MAX_IMAGE_SIZE_BYTES:5242880}
    max-video-size-bytes: ${CHAT_MEDIA_MAX_VIDEO_SIZE_BYTES:52428800}

storage:
  s3:
    bucket: ${S3_BUCKET:}
    region: ${S3_REGION:ap-southeast-1}
    products-prefix: ${S3_PRODUCTS_PREFIX:products/}
    avatars-prefix: ${S3_AVATARS_PREFIX:avatars/}
    chat-media-prefix: ${S3_CHAT_MEDIA_PREFIX:chat-media/}
    temp-prefix: ${S3_TEMP_PREFIX:temp/}
    cdn-base-url: ${CDN_BASE_URL:}
    encryption: ${S3_ENCRYPTION:SSE-S3}
    cache-control: ${S3_CACHE_CONTROL:public, max-age=31536000, immutable}
    max-product-image-size-bytes: ${S3_PRODUCT_IMAGE_MAX_SIZE_BYTES:5242880}
    max-avatar-size-bytes: ${S3_AVATAR_MAX_SIZE_BYTES:5242880}
    max-chat-image-size-bytes: ${S3_CHAT_IMAGE_MAX_SIZE_BYTES:5242880}
    max-chat-video-size-bytes: ${S3_CHAT_VIDEO_MAX_SIZE_BYTES:52428800}
