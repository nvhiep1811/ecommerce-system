spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: catalog-service
  datasource:
    url: ${ECOMMERCE_DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${ECOMMERCE_DB_USERNAME:postgres}
    password: ${ECOMMERCE_DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}

server:
  port: ${CATALOG_SERVICE_PORT:8082}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:200}
      min-spare: ${SERVER_TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
  connection-timeout: ${SERVER_CONNECTION_TIMEOUT:5s}

security:
  jwt:
    secret: ${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
    expiration-seconds: ${ECOMMERCE_JWT_EXPIRATION_SECONDS:86400}

clients:
  commerce-service:
    base-url: ${COMMERCE_SERVICE_BASE_URL:http://localhost:8083}

catalog:
  read-cache:
    enabled: ${CATALOG_READ_CACHE_ENABLED:true}
    store: ${CATALOG_READ_CACHE_STORE:auto}
    ttl-seconds: ${CATALOG_READ_CACHE_TTL_SECONDS:15}
    max-entries: ${CATALOG_READ_CACHE_MAX_ENTRIES:500}

resilience4j:
  retry:
    instances:
      inventorySync:
        max-attempts: 3
        wait-duration: 500ms
  circuitbreaker:
    instances:
      inventorySync:
        sliding-window-size: ${INVENTORY_SYNC_CB_WINDOW_SIZE:100}
        failure-rate-threshold: ${INVENTORY_SYNC_CB_FAILURE_RATE_THRESHOLD:40}
        slow-call-rate-threshold: ${INVENTORY_SYNC_CB_SLOW_CALL_RATE_THRESHOLD:80}
        slow-call-duration-threshold: ${INVENTORY_SYNC_CB_SLOW_CALL_DURATION:2s}
        register-health-indicator: true
  bulkhead:
    instances:
      inventorySync:
        max-concurrent-calls: ${INVENTORY_SYNC_BULKHEAD_MAX_CONCURRENT_CALLS:50}
        max-wait-duration: ${INVENTORY_SYNC_BULKHEAD_MAX_WAIT_DURATION:50ms}

outbox:
  relay-delay-ms: ${OUTBOX_RELAY_DELAY_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
