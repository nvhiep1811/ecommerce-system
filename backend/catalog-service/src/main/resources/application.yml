spring:
  config:
    import:
      - optional:file:backend/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: catalog-service
  datasource:
    url: ${ECOMMERCE_DB_URL:jdbc:postgresql://db.dglfcdxadwvvvhlqnkyp.supabase.co:5432/postgres}
    username: ${ECOMMERCE_DB_USERNAME:postgres}
    password: ${ECOMMERCE_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false

server:
  port: ${CATALOG_SERVICE_PORT:8082}

security:
  jwt:
    secret: ${ECOMMERCE_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
    expiration-seconds: ${ECOMMERCE_JWT_EXPIRATION_SECONDS:86400}

clients:
  commerce-service:
    base-url: ${COMMERCE_SERVICE_BASE_URL:http://localhost:8083}

resilience4j:
  retry:
    instances:
      inventorySync:
        max-attempts: 3
        wait-duration: 500ms
  bulkhead:
    instances:
      inventorySync:
        max-concurrent-calls: 10
        max-wait-duration: 0

outbox:
  relay-delay-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
