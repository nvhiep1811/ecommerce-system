apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-backend-config
data:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_TIMEOUT: 2s
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  EVENTS_KAFKA_ENABLED: "true"
  EVENTS_KAFKA_RETRY_MAX_ATTEMPTS: "3"
  EVENTS_KAFKA_RETRY_BACKOFF_MS: "1000"
  EVENTS_KAFKA_DLT_SUFFIX: .DLT
  PAYMENT_EXPIRATION_QUEUE_ENABLED: "true"
  PAYMENT_EXPIRATION_QUEUE_REDIS_KEY: payment:expiration:due
  PAYMENT_EXPIRATION_QUEUE_POLL_DELAY_MS: "1000"
  PAYMENT_EXPIRATION_QUEUE_BATCH_SIZE: "100"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_HEALTH_SHOW_DETAILS: never
  MANAGEMENT_HTTP_SERVER_REQUESTS_HISTOGRAM: "true"
  DB_POOL_MAX_SIZE: "20"
  DB_POOL_MIN_IDLE: "5"
  DB_POOL_CONNECTION_TIMEOUT_MS: "5000"
  SERVER_TOMCAT_MAX_THREADS: "200"
  SERVER_TOMCAT_MIN_SPARE_THREADS: "20"
  SERVER_TOMCAT_ACCEPT_COUNT: "100"
  USER_SERVICE_URL: http://user-service:8081
  CATALOG_SERVICE_URL: http://catalog-service:8082
  COMMERCE_SERVICE_URL: http://commerce-service:8083
  CHAT_SERVICE_URL: http://chat-service:8086
  CHAT_SERVICE_WS_URL: ws://chat-service:8086
  ASSISTANT_SERVICE_URL: http://assistant-service:8084
  USER_SERVICE_BASE_URL: http://user-service:8081
  CATALOG_SERVICE_BASE_URL: http://catalog-service:8082
  COMMERCE_SERVICE_BASE_URL: http://commerce-service:8083
  CHAT_SERVICE_BASE_URL: http://chat-service:8086
  S3_BUCKET: ecommerce-prod-media-4ss-2026
  S3_REGION: ap-southeast-1
  S3_PRODUCTS_PREFIX: products/
  S3_AVATARS_PREFIX: avatars/
  S3_CHAT_MEDIA_PREFIX: chat-media/
  S3_TEMP_PREFIX: temp/
  S3_ENCRYPTION: SSE-S3
  S3_CACHE_CONTROL: public, max-age=31536000, immutable
  S3_PRODUCT_IMAGE_MAX_SIZE_BYTES: "5242880"
  S3_AVATAR_MAX_SIZE_BYTES: "5242880"
  S3_CHAT_IMAGE_MAX_SIZE_BYTES: "5242880"
  S3_CHAT_VIDEO_MAX_SIZE_BYTES: "52428800"
  CDN_BASE_URL: https://d35ci4s1xmcpe.cloudfront.net
