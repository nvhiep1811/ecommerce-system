apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-backend-secrets
type: Opaque
stringData:
  ECOMMERCE_JWT_SECRET: replace-with-strong-secret-at-least-32-bytes
  AUTH_OTP_SECRET: replace-with-strong-otp-secret
  ECOMMERCE_DB_URL: jdbc:postgresql://postgres:5432/ecommerce
  ECOMMERCE_DB_USERNAME: postgres
  ECOMMERCE_DB_PASSWORD: postgres
  REDIS_PASSWORD: ""
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""
  SEPAY_MERCHANT_ID: ""
  SEPAY_SECRET_KEY: ""
  SEPAY_WEBHOOK_SECRET: ""
  GEMINI_API_KEY: ""
